<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch — NEXUS Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#040508;--bg2:#080b12;--bg3:#0c1020;
  --surface:rgba(255,255,255,0.035);--surface2:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf0;--text2:#8b90a8;--text3:#555b72;
  --accent:#5b8dee;--accent2:#7c6dfa;--accent3:#0fe8c8;
  --green:#2fd771;--amber:#f5a623;--red:#f0635a;
  --font-display:'Syne',sans-serif;--font-mono:'Space Mono',monospace;--font-body:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);line-height:1.6;overflow-x:hidden;cursor:none}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--accent2);border-radius:4px}

#cursor{position:fixed;width:10px;height:10px;border-radius:50%;background:var(--accent);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;transition:width .15s,height .15s}
#cursor-ring{position:fixed;width:36px;height:36px;border-radius:50%;border:1px solid rgba(91,141,238,0.5);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s,border-color .3s}
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.45}
.site-wrap{position:relative;z-index:1;min-height:100vh}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;background:rgba(4,5,8,0.8);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:var(--font-display);font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;letter-spacing:-0.02em}
.nav-logo span{-webkit-text-fill-color:var(--accent3)}
.nav-center{font-family:var(--font-display);font-size:0.875rem;font-weight:700;color:var(--text3);letter-spacing:0.02em}
.nav-back{display:flex;align-items:center;gap:0.4rem;padding:0.4rem 0.9rem;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text2);font-size:0.85rem;text-decoration:none;cursor:none;transition:.2s}
.nav-back:hover{border-color:var(--accent);color:var(--accent)}

/* PAGE HERO */
.page-hero{padding:110px 2rem 32px;text-align:center}
.tool-chip{display:inline-flex;align-items:center;gap:0.5rem;padding:0.3rem 0.9rem;border-radius:100px;background:rgba(15,232,200,0.1);border:1px solid rgba(15,232,200,0.25);color:var(--accent3);font-size:0.8rem;font-weight:500;margin-bottom:1.1rem}
.page-title{font-family:var(--font-display);font-size:clamp(2rem,5vw,3rem);font-weight:800;letter-spacing:-0.04em;line-height:1.05;margin-bottom:0.5rem}
.page-title span{background:linear-gradient(135deg,var(--accent3),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.page-sub{color:var(--text2);font-size:0.95rem;font-weight:300;max-width:420px;margin:0 auto}

/* MAIN */
.main{max-width:640px;margin:0 auto;padding:0 2rem 5rem}

/* STOPWATCH CARD */
.sw-card{background:var(--bg2);border:1px solid var(--border2);border-radius:24px;overflow:hidden;box-shadow:0 32px 64px rgba(0,0,0,0.4)}
.sw-header{padding:1.25rem 1.75rem;background:linear-gradient(135deg,rgba(15,232,200,0.07),transparent);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.75rem}
.sw-header-icon{width:44px;height:44px;border-radius:12px;background:rgba(15,232,200,0.12);display:flex;align-items:center;justify-content:center;font-size:1.3rem}
.sw-header-title{font-family:var(--font-display);font-size:1rem;font-weight:700}
.sw-header-sub{font-size:0.8rem;color:var(--text2);margin-top:0.15rem}

/* CLOCK DISPLAY */
.sw-body{padding:2.5rem 2rem 2rem}
.sw-display{text-align:center;margin-bottom:2rem}
.sw-ring{width:240px;height:240px;margin:0 auto 1.5rem;position:relative}
.sw-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.sw-ring-bg{fill:none;stroke:var(--bg3);stroke-width:8}
.sw-ring-fg{fill:none;stroke:url(#sw-grad);stroke-width:8;stroke-linecap:round;stroke-dasharray:691;stroke-dashoffset:691;transition:stroke-dashoffset 0.05s linear}
.sw-time-wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.sw-time{font-family:var(--font-mono);font-size:2.6rem;font-weight:700;letter-spacing:-0.02em;color:var(--text);line-height:1}
.sw-ms{font-family:var(--font-mono);font-size:1.1rem;color:var(--accent3);margin-top:0.25rem;letter-spacing:0.02em}
.sw-status{font-size:0.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-top:0.3rem}

/* CONTROLS */
.sw-controls{display:flex;gap:0.75rem;justify-content:center;margin-bottom:1.75rem}
.sw-btn{width:72px;height:72px;border-radius:50%;border:none;font-size:1.3rem;cursor:none;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:var(--font-body);font-weight:600;flex-direction:column;gap:2px}
.sw-btn-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.08em;font-family:var(--font-body)}
.sw-btn-start{background:linear-gradient(135deg,var(--accent3),var(--accent));color:#fff;box-shadow:0 0 24px rgba(15,232,200,0.35);width:84px;height:84px;font-size:1.5rem}
.sw-btn-start:hover{transform:scale(1.07);box-shadow:0 0 36px rgba(15,232,200,0.5)}
.sw-btn-lap{background:var(--surface2);border:1px solid var(--border2);color:var(--text2)}
.sw-btn-lap:hover{border-color:var(--accent);color:var(--accent)}
.sw-btn-reset{background:var(--surface2);border:1px solid var(--border2);color:var(--text2)}
.sw-btn-reset:hover{border-color:var(--red);color:var(--red)}

/* LAP TABLE */
.lap-section{border-top:1px solid var(--border);padding-top:1.25rem}
.lap-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem}
.lap-title{font-size:0.8rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em}
.lap-count{font-size:0.75rem;color:var(--text3);font-family:var(--font-mono)}
.lap-list{max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:0.375rem}
.lap-list::-webkit-scrollbar{width:3px}
.lap-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.lap-item{display:grid;grid-template-columns:auto 1fr auto auto;gap:0.75rem;align-items:center;background:var(--bg3);border-radius:9px;padding:0.6rem 0.9rem;font-size:0.85rem}
.lap-num{font-family:var(--font-mono);font-size:0.72rem;color:var(--text3);font-weight:700}
.lap-badge{font-size:0.65rem;padding:0.15rem 0.45rem;border-radius:100px;font-weight:600}
.badge-fastest{background:rgba(47,215,113,0.15);color:var(--green)}
.badge-slowest{background:rgba(240,99,90,0.15);color:var(--red)}
.badge-normal{background:var(--surface2);color:var(--text3)}
.lap-split{font-family:var(--font-mono);font-size:0.8rem;color:var(--accent3)}
.lap-total{font-family:var(--font-mono);font-size:0.8rem;color:var(--text3)}
.lap-empty{text-align:center;color:var(--text3);font-size:0.85rem;padding:1.5rem 0}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .7s ease both}
@keyframes lapIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-ring"></div>
<canvas id="bg-canvas"></canvas>

<div class="site-wrap">
<nav>
  <a href="index.html" class="nav-logo">NEXUS<span>.</span></a>
  <span class="nav-center">Productivity Tools</span>
  <a href="index.html" class="nav-back">← All Tools</a>
</nav>

<div class="page-hero fade-up">
  <div class="tool-chip">⏱️ Productivity</div>
  <h1 class="page-title"><span>Stopwatch</span></h1>
  <p class="page-sub">Precision timing with lap splits, fastest & slowest lap detection, and full history.</p>
</div>

<div class="main fade-up" style="animation-delay:.1s">
  <div class="sw-card">
    <div class="sw-header">
      <div class="sw-header-icon">⏱️</div>
      <div>
        <div class="sw-header-title">Stopwatch</div>
        <div class="sw-header-sub">Press Space to start / stop · L to lap</div>
      </div>
    </div>
    <div class="sw-body">

      <!-- RING CLOCK -->
      <div class="sw-display">
        <div class="sw-ring">
          <svg viewBox="0 0 220 220">
            <defs>
              <linearGradient id="sw-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#0fe8c8"/>
                <stop offset="100%" stop-color="#5b8dee"/>
              </linearGradient>
            </defs>
            <circle class="sw-ring-bg" cx="110" cy="110" r="100"/>
            <circle class="sw-ring-fg" id="sw-ring-fg" cx="110" cy="110" r="110"/>
          </svg>
          <div class="sw-time-wrap">
            <div class="sw-time" id="sw-time">00:00</div>
            <div class="sw-ms" id="sw-ms">.000</div>
            <div class="sw-status" id="sw-status">Ready</div>
          </div>
        </div>
      </div>

      <!-- CONTROLS -->
      <div class="sw-controls">
        <button class="sw-btn sw-btn-lap" id="btn-lap" onclick="recordLap()" title="Lap (L)">
          <span>🏁</span><span class="sw-btn-label">Lap</span>
        </button>
        <button class="sw-btn sw-btn-start" id="btn-start" onclick="toggleSW()" title="Start/Stop (Space)">
          <span id="btn-start-icon">▶</span>
        </button>
        <button class="sw-btn sw-btn-reset" id="btn-reset" onclick="resetSW()" title="Reset">
          <span>↺</span><span class="sw-btn-label">Reset</span>
        </button>
      </div>

      <!-- LAP TABLE -->
      <div class="lap-section">
        <div class="lap-header">
          <span class="lap-title">Lap History</span>
          <span class="lap-count" id="lap-count">0 laps</span>
        </div>
        <div class="lap-list" id="lap-list">
          <div class="lap-empty">No laps recorded yet. Hit 🏁 while running.</div>
        </div>
      </div>

    </div><!-- /sw-body -->
  </div><!-- /sw-card -->
</div>

</div><!-- /site-wrap -->

<script>
// ── CURSOR ──
const cur=document.getElementById('cursor'),ring=document.getElementById('cursor-ring');
let cx=0,cy=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{cx=e.clientX;cy=e.clientY;cur.style.left=cx+'px';cur.style.top=cy+'px'});
(function loop(){rx+=(cx-rx)*.12;ry+=(cy-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop)})();
document.addEventListener('mousedown',()=>{cur.style.width='6px';cur.style.height='6px'});
document.addEventListener('mouseup',()=>{cur.style.width='10px';cur.style.height='10px'});
document.querySelectorAll('button,a').forEach(el=>{
  el.addEventListener('mouseenter',()=>{ring.style.width='52px';ring.style.height='52px';ring.style.borderColor='rgba(91,141,238,0.8)'});
  el.addEventListener('mouseleave',()=>{ring.style.width='36px';ring.style.height='36px';ring.style.borderColor='rgba(91,141,238,0.5)'});
});

// ── CANVAS ──
(function(){
  const c=document.getElementById('bg-canvas'),ctx=c.getContext('2d');
  let W,H,P=[];
  const resize=()=>{W=c.width=window.innerWidth;H=c.height=window.innerHeight};
  resize();window.addEventListener('resize',resize);
  for(let i=0;i<70;i++)P.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.5,o:Math.random()*.35+.08});
  (function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle='rgba(255,255,255,0.018)';ctx.lineWidth=1;
    for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
    for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
    P.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(15,232,200,${p.o})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  })();
})();

// ── STOPWATCH ──
let running=false, startTime=0, elapsed=0, lapStart=0, laps=[], rafId=null;

const swTime=document.getElementById('sw-time');
const swMs=document.getElementById('sw-ms');
const swStatus=document.getElementById('sw-status');
const swRing=document.getElementById('sw-ring-fg');
const btnStartIcon=document.getElementById('btn-start-icon');
const lapList=document.getElementById('lap-list');
const lapCount=document.getElementById('lap-count');

// Ring circumference at r=110 is 2π×110 ≈ 691
const CIRC=2*Math.PI*110;

function fmt(ms){
  const m=Math.floor(ms/60000);
  const s=Math.floor((ms%60000)/1000);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function fmtMs(ms){return '.'+String(ms%1000).padStart(3,'0')}
function fmtFull(ms){
  const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),t=ms%1000;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(t).padStart(3,'0')}`;
}

function updateDisplay(ms){
  swTime.textContent=fmt(ms);
  swMs.textContent=fmtMs(ms);
  // ring: 60s = full circle
  const secs=(ms/1000)%60;
  const offset=CIRC-(secs/60)*CIRC;
  swRing.style.strokeDashoffset=offset;
}

function tick(){
  const now=performance.now();
  elapsed=now-startTime;
  updateDisplay(elapsed);
  rafId=requestAnimationFrame(tick);
}

function toggleSW(){
  if(!running){
    // Start
    startTime=performance.now()-elapsed;
    if(laps.length===0)lapStart=elapsed;
    running=true;
    btnStartIcon.textContent='⏸';
    swStatus.textContent='Running';
    swStatus.style.color='var(--accent3)';
    rafId=requestAnimationFrame(tick);
  } else {
    // Pause
    cancelAnimationFrame(rafId);
    running=false;
    btnStartIcon.textContent='▶';
    swStatus.textContent='Paused';
    swStatus.style.color='var(--amber)';
  }
}

function recordLap(){
  if(!running&&elapsed===0)return;
  const lapTime=elapsed-lapStart;
  lapStart=elapsed;
  laps.unshift({num:laps.length+1,split:lapTime,total:elapsed});
  renderLaps();
}

function resetSW(){
  cancelAnimationFrame(rafId);
  running=false;elapsed=0;lapStart=0;laps=[];
  updateDisplay(0);
  btnStartIcon.textContent='▶';
  swStatus.textContent='Ready';
  swStatus.style.color='var(--text3)';
  swRing.style.strokeDashoffset=CIRC;
  renderLaps();
}

function renderLaps(){
  lapCount.textContent=`${laps.length} lap${laps.length!==1?'s':''}`;
  if(!laps.length){
    lapList.innerHTML='<div class="lap-empty">No laps recorded yet. Hit 🏁 while running.</div>';
    return;
  }
  const splits=laps.map(l=>l.split);
  const fastest=Math.min(...splits),slowest=Math.max(...splits);
  lapList.innerHTML=laps.map(l=>{
    let badgeClass='badge-normal',badgeText='';
    if(l.split===fastest&&laps.length>1){badgeClass='badge-fastest';badgeText='Fastest';}
    else if(l.split===slowest&&laps.length>1){badgeClass='badge-slowest';badgeText='Slowest';}
    return `<div class="lap-item" style="animation:lapIn .25s ease both">
      <span class="lap-num">LAP ${String(l.num).padStart(2,'0')}</span>
      <span class="lap-badge ${badgeClass}">${badgeText||'—'}</span>
      <span class="lap-split">${fmtFull(l.split)}</span>
      <span class="lap-total">${fmtFull(l.total)}</span>
    </div>`;
  }).join('');
}

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.code==='Space'){e.preventDefault();toggleSW();}
  if(e.key.toLowerCase()==='l'){recordLap();}
  if(e.key.toLowerCase()==='r'){resetSW();}
});
</script>
</body>
</html>
